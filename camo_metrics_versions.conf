# CAMO Metrics Version Configuration
#
# This file defines which Prometheus metrics are available in each CAMO operator version.
# Used by analysis scripts to provide version-aware metrics collection and reporting.
#
# Format: version_regex:metric1,metric2,metric3,...
#
# All versions support these core metrics (added in early releases):
#   - ga_secret_exists
#   - pd_secret_exists
#   - dms_secret_exists
#   - am_secret_exists
#   - am_secret_contains_ga
#   - am_secret_contains_pd
#   - am_secret_contains_dms
#   - managed_namespaces_configmap_exists
#   - ocp_namespaces_configmap_exists
#   - alertmanager_config_validation_failed
#

# Core metrics available in all versions (0.1.x and later)
^0\.1\.:ga_secret_exists,pd_secret_exists,dms_secret_exists,am_secret_exists,am_secret_contains_ga,am_secret_contains_pd,am_secret_contains_dms,managed_namespaces_configmap_exists,ocp_namespaces_configmap_exists,alertmanager_config_validation_failed

# Fallback for any version (all metrics)
^.*:ga_secret_exists,pd_secret_exists,dms_secret_exists,am_secret_exists,am_secret_contains_ga,am_secret_contains_pd,am_secret_contains_dms,managed_namespaces_configmap_exists,ocp_namespaces_configmap_exists,alertmanager_config_validation_failed
